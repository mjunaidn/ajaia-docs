services:
  - type: web
    name: ajaia-docs
    runtime: node
    plan: free
    # --include=dev is required: NODE_ENV=production below makes npm skip
    # devDependencies (including vite, needed for the client build) otherwise.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
